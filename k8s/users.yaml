---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: users-deployment
  labels:
    app: users
spec:
  replicas: 1
  selector:
    matchLabels:
      app: users
  template:
    metadata:
      labels:
        app: users
    spec:
      containers:
      - name: users
        image: 22i0837/lightstep-users:a67ed7915c8703b36182bc94945b6699d8067a4a
        ports:
        - containerPort: 8080
        env:
        - name: DBHOST
          value: "mongodb://mongo-service:27017"

---
apiVersion: v1
kind: Service
metadata:
  name: users-service
spec:
  type: ClusterIP
  selector:
    app: users
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
